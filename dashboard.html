<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeCraftHub: Your Learning Management Platform</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        header {
            background: linear-gradient(135deg, #8B5CF6 0%, #7C3AED 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        header h1 {
            font-size: 2em;
            margin-bottom: 10px;
        }

        header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .content {
            padding: 30px;
        }

        .form-section {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 8px;
            margin-bottom: 30px;
            border: 2px solid #8B5CF6;
        }

        .form-section h2 {
            color: #8B5CF6;
            margin-bottom: 20px;
            font-size: 1.5em;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 15px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group.full-width {
            grid-column: 1 / -1;
        }

        label {
            font-weight: 600;
            margin-bottom: 5px;
            color: #333;
        }

        input, textarea, select {
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-size: 1em;
            transition: border-color 0.3s;
            font-family: inherit;
        }

        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #8B5CF6;
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-primary {
            background: #8B5CF6;
        }

        .btn-primary:hover:not(:disabled) {
            background: #7C3AED;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(139, 92, 246, 0.4);
        }

        .btn-success {
            background: #F59E0B;
            color: white;
            padding: 8px 16px;
            font-size: 0.9em;
        }

        .btn-success:hover:not(:disabled) {
            background: #D97706;
        }

        .btn-danger {
            background: #EF4444;
            color: white;
            padding: 8px 16px;
            font-size: 0.9em;
        }

        .btn-danger:hover:not(:disabled) {
            background: #DC2626;
        }

        .courses-section h2 {
            color: #8B5CF6;
            margin-bottom: 20px;
            font-size: 1.5em;
        }

        .courses-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
        }

        .course-card {
            background: white;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            padding: 20px;
            transition: all 0.3s;
            position: relative;
        }

        .course-card:hover {
            border-color: #8B5CF6;
            box-shadow: 0 4px 12px rgba(139, 92, 246, 0.2);
            transform: translateY(-4px);
        }

        .course-header {
            margin-bottom: 15px;
        }

        .course-name {
            font-size: 1.3em;
            font-weight: 700;
            color: #1f2937;
            margin-bottom: 8px;
        }

        .course-description {
            color: #6b7280;
            margin-bottom: 15px;
            line-height: 1.5;
        }

        .course-meta {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 15px;
            font-size: 0.9em;
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #6b7280;
        }

        .meta-label {
            font-weight: 600;
            color: #374151;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 600;
        }

        .status-not-started {
            background: #fee2e2;
            color: #991b1b;
        }

        .status-in-progress {
            background: #fef3c7;
            color: #92400e;
        }

        .status-completed {
            background: #d1fae5;
            color: #065f46;
        }

        .course-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #e5e7eb;
        }

        .message {
            padding: 15px 20px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-weight: 500;
            display: none;
        }

        .message.show {
            display: block;
        }

        .message-success {
            background: #d1fae5;
            color: #065f46;
            border: 2px solid #10b981;
        }

        .message-error {
            background: #fee2e2;
            color: #991b1b;
            border: 2px solid #ef4444;
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .loading-overlay.show {
            display: flex;
        }

        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 6px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s linear infinite;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 12px;
            padding: 30px;
            max-width: 600px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-header h2 {
            color: #8B5CF6;
            font-size: 1.5em;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 2em;
            color: #6b7280;
            cursor: pointer;
            padding: 0;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }

        .close-btn:hover {
            background: #f3f4f6;
            color: #1f2937;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #6b7280;
        }

        .empty-state svg {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .empty-state h3 {
            font-size: 1.3em;
            margin-bottom: 10px;
            color: #374151;
        }

        @media (max-width: 768px) {
            body {
                padding: 10px;
            }

            header h1 {
                font-size: 1.5em;
            }

            header p {
                font-size: 1em;
            }

            .content {
                padding: 20px;
            }

            .form-grid {
                grid-template-columns: 1fr;
            }

            .courses-grid {
                grid-template-columns: 1fr;
            }

            .modal-content {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner"></div>
    </div>

    <div class="modal" id="editModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Edit Course</h2>
                <button class="close-btn" onclick="closeEditModal()">&times;</button>
            </div>
            <form id="editForm">
                <input type="hidden" id="editCourseId">
                <div class="form-grid">
                    <div class="form-group full-width">
                        <label for="editName">Course Name *</label>
                        <input type="text" id="editName" required>
                    </div>
                    <div class="form-group full-width">
                        <label for="editDescription">Description *</label>
                        <textarea id="editDescription" required></textarea>
                    </div>
                    <div class="form-group">
                        <label for="editTargetDate">Target Date *</label>
                        <input type="date" id="editTargetDate" required>
                    </div>
                    <div class="form-group">
                        <label for="editStatus">Status *</label>
                        <select id="editStatus" required>
                            <option value="Not Started">Not Started</option>
                            <option value="In Progress">In Progress</option>
                            <option value="Completed">Completed</option>
                        </select>
                    </div>
                </div>
                <button type="submit" class="btn-primary" style="margin-top: 20px;">
                    <span id="editBtnText">Update Course</span>
                    <span class="spinner" id="editSpinner" style="display: none;"></span>
                </button>
            </form>
        </div>
    </div>

    <div class="container">
        <header>
            <h1>CodeCraftHub</h1>
            <p>Your Learning Management Platform</p>
        </header>

        <div class="content">
            <div class="message" id="messageBox"></div>

            <div class="form-section">
                <h2>Add New Course</h2>
                <form id="addCourseForm">
                    <div class="form-grid">
                        <div class="form-group full-width">
                            <label for="name">Course Name *</label>
                            <input type="text" id="name" name="name" required placeholder="e.g., Advanced JavaScript">
                        </div>
                        <div class="form-group full-width">
                            <label for="description">Description *</label>
                            <textarea id="description" name="description" required placeholder="Brief description of the course"></textarea>
                        </div>
                        <div class="form-group">
                            <label for="target_date">Target Date *</label>
                            <input type="date" id="target_date" name="target_date" required>
                        </div>
                        <div class="form-group">
                            <label for="status">Status *</label>
                            <select id="status" name="status" required>
                                <option value="Not Started">Not Started</option>
                                <option value="In Progress">In Progress</option>
                                <option value="Completed">Completed</option>
                            </select>
                        </div>
                    </div>
                    <button type="submit" class="btn-primary">
                        <span id="addBtnText">Add Course</span>
                        <span class="spinner" id="addSpinner" style="display: none;"></span>
                    </button>
                </form>
            </div>

            <div class="courses-section">
                <h2>My Courses</h2>
                <div class="courses-grid" id="coursesGrid"></div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE_URL = 'http://localhost:5001/api/courses';
        // http://127.0.0.1:5001/api/courses
        // http://localhost:5001/api/courses

        // Utility functions
        function showMessage(message, type) {
            const messageBox = document.getElementById('messageBox');
            messageBox.textContent = message;
            messageBox.className = `message message-${type} show`;
            setTimeout(() => {
                messageBox.classList.remove('show');
            }, 5000);
        }

        function showLoading(show) {
            const overlay = document.getElementById('loadingOverlay');
            if (show) {
                overlay.classList.add('show');
            } else {
                overlay.classList.remove('show');
            }
        }

        function formatDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
        }

        function getStatusClass(status) {
            const statusMap = {
                'Not Started': 'status-not-started',
                'In Progress': 'status-in-progress',
                'Completed': 'status-completed'
            };
            return statusMap[status] || 'status-not-started';
        }

        // API Functions
        async function fetchCourses() {
            showLoading(true);
            try {
                
                const response = await fetch(API_BASE_URL);
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                const courses = await response.json();
                displayCourses(courses);
            } catch (error) {
                console.error('Error fetching courses:', error);
                showMessage('Failed to load courses. Please check if the API server is running.', 'error');
            } finally {
                showLoading(false);
            }
        }

        async function addCourse(courseData) {
            const addBtn = document.querySelector('#addCourseForm button[type="submit"]');
            const addBtnText = document.getElementById('addBtnText');
            const addSpinner = document.getElementById('addSpinner');

            addBtn.disabled = true;
            addBtnText.style.display = 'none';
            addSpinner.style.display = 'inline-block';

            try {
                const response = await fetch(API_BASE_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(courseData)
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                showMessage('Course added successfully!', 'success');
                document.getElementById('addCourseForm').reset();
                await fetchCourses();
            } catch (error) {
                console.error('Error adding course:', error);
                showMessage('Failed to add course. Please try again.', 'error');
            } finally {
                addBtn.disabled = false;
                addBtnText.style.display = 'inline';
                addSpinner.style.display = 'none';
            }
        }

        async function updateCourse(id, courseData) {
            const editBtn = document.querySelector('#editForm button[type="submit"]');
            const editBtnText = document.getElementById('editBtnText');
            const editSpinner = document.getElementById('editSpinner');

            editBtn.disabled = true;
            editBtnText.style.display = 'none';
            editSpinner.style.display = 'inline-block';

            try {
                const response = await fetch(`${API_BASE_URL}/${id}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(courseData)
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                showMessage('Course updated successfully!', 'success');
                closeEditModal();
                await fetchCourses();
            } catch (error) {
                console.error('Error updating course:', error);
                showMessage('Failed to update course. Please try again.', 'error');
            } finally {
                editBtn.disabled = false;
                editBtnText.style.display = 'inline';
                editSpinner.style.display = 'none';
            }
        }

        async function handleDelete(id) {
            if (!confirm('Are you sure you want to delete this course? This action cannot be undone.')) {
                return;
            }

            showLoading(true);
            try {
                const response = await fetch(`${API_BASE_URL}/${id}`, {
                    method: 'DELETE'
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                showMessage('Course deleted successfully!', 'success');
                await fetchCourses();
            } catch (error) {
                console.error('Error deleting course:', error);
                showMessage('Failed to delete course. Please try again.', 'error');
            } finally {
                showLoading(false);
            }
        }

        // Display Functions
        function displayCourses(courses) {
            const grid = document.getElementById('coursesGrid');

            if (!courses || courses.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path>
                        </svg>
                        <h3>No Courses Yet</h3>
                        <p>Start by adding your first course above!</p>
                    </div>
                `;
                return;
            }

            grid.innerHTML = courses.map(course => `
                <div class="course-card">
                    <div class="course-header">
                        <div class="course-name">${escapeHtml(course.name)}</div>
                    </div>
                    <div class="course-description">${escapeHtml(course.description)}</div>
                    <div class="course-meta">
                        <div class="meta-item">
                            <span class="meta-label">Target Date:</span>
                            <span>${formatDate(course.target_date)}</span>
                        </div>
                        <div class="meta-item">
                            <span class="meta-label">Status:</span>
                            <span class="status-badge ${getStatusClass(course.status)}">${course.status}</span>
                        </div>
                        ${course.created_at ? `
                        <div class="meta-item">
                            <span class="meta-label">Created:</span>
                            <span>${formatDate(course.created_at)}</span>
                        </div>
                        ` : ''}
                    </div>
                    <div class="course-actions">
                        <button class="btn-success" onclick="openEditModal(${course.id})">Edit</button>
                        <button class="btn-danger" onclick="handleDelete(${course.id})">Remove</button>
                    </div>
                </div>
            `).join('');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Modal Functions
        function openEditModal(courseId) {
            showLoading(true);
            fetch(`${API_BASE_URL}`)
                .then(response => response.json())
                .then(courses => {
                    const course = courses.find(c => c.id === courseId);
                    if (!course) {
                        throw new Error('Course not found');
                    }

                    document.getElementById('editCourseId').value = course.id;
                    document.getElementById('editName').value = course.name;
                    document.getElementById('editDescription').value = course.description;
                    document.getElementById('editTargetDate').value = course.target_date;
                    document.getElementById('editStatus').value = course.status;

                    document.getElementById('editModal').classList.add('show');
                })
                .catch(error => {
                    console.error('Error loading course:', error);
                    showMessage('Failed to load course details.', 'error');
                })
                .finally(() => {
                    showLoading(false);
                });
        }

        function closeEditModal() {
            document.getElementById('editModal').classList.remove('show');
            document.getElementById('editForm').reset();
        }

        // Event Listeners
        document.getElementById('addCourseForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const formData = {
                name: document.getElementById('name').value.trim(),
                description: document.getElementById('description').value.trim(),
                target_date: document.getElementById('target_date').value,
                status: document.getElementById('status').value
            };

            
            // Validation
            if (!formData.name || !formData.description || !formData.target_date || !formData.status) {
                showMessage('Please fill in all required fields.', 'error');
                return;
            }

            await addCourse(formData);
        });

        document.getElementById('editForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const id = document.getElementById('editCourseId').value;
            const formData = {
                name: document.getElementById('editName').value.trim(),
                description: document.getElementById('editDescription').value.trim(),
                target_date: document.getElementById('editTargetDate').value,
                status: document.getElementById('editStatus').value
            };

            // Validation
            if (!formData.name || !formData.description || !formData.target_date || !formData.status) {
                showMessage('Please fill in all required fields.', 'error');
                return;
            }

            await updateCourse(id, formData);
        });

        // Close modal when clicking outside
        document.getElementById('editModal').addEventListener('click', (e) => {
            if (e.target.id === 'editModal') {
                closeEditModal();
            }
        });

        // Initialize
        fetchCourses();
    </script>
</body>
</html>
